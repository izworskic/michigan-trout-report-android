name: Build Android App Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Decode Keystore
      if: env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

    - name: Build Release AAB
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/app/release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        chmod +x gradlew || true
        ./gradlew bundleRelease 2>/dev/null || gradle bundleRelease

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: michigan-trout-report-release
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Upload APK (debug, for testing)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: michigan-trout-report-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: ignore
