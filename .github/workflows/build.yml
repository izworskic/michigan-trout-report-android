name: Build Android App Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Generate Upload Keystore
      run: |
        keytool -genkeypair -v \
          -keystore app/upload-keystore.jks \
          -alias upload \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass troutreport2026 \
          -keypass troutreport2026 \
          -dname "CN=Chris Izworski, O=Freighter View Farms, L=Bay City, ST=Michigan, C=US"

    - name: Build Signed Release AAB
      run: ./gradlew bundleRelease

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: michigan-trout-report-signed
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Upload Keystore
      uses: actions/upload-artifact@v4
      with:
        name: upload-keystore
        path: app/upload-keystore.jks
